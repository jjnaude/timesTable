<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2c7be5" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Times Table Sprint</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="language-picker">
        <label for="language-select" data-i18n="label.language">Language</label>
        <select id="language-select" aria-label="Language"></select>
      </div>

      <h1 data-i18n="title.app">Times Table Sprint</h1>
      <button id="install-btn" class="secondary hidden" type="button">Install app</button>

      <section id="vehicle-stage" class="vehicle-stage hidden" aria-live="polite" aria-label="Vehicle stage">
        <div id="vehicle-environment" class="vehicle-stage__environment">
          <div class="vehicle-stage__sun" aria-hidden="true"></div>
          <div class="vehicle-stage__hills vehicle-stage__hills--far" aria-hidden="true"></div>
          <div class="vehicle-stage__hills vehicle-stage__hills--mid" aria-hidden="true"></div>
          <div class="vehicle-stage__hills vehicle-stage__hills--near" aria-hidden="true"></div>
          <div id="vehicle-foreground-layer" class="vehicle-stage__foreground-layer" aria-hidden="true"></div>
          <div class="vehicle-stage__road" aria-hidden="true"></div>
          <button id="open-garage-btn" class="vehicle-stage__open" type="button" aria-label="Open garage">
            <div id="vehicle-sprite" class="vehicle-stage__sprite" role="img" aria-label="Player vehicle"></div>
          </button>
        </div>
      </section>

      <section id="garage-modal" class="garage-modal hidden" aria-hidden="true">
        <div id="garage-backdrop" class="garage-modal__backdrop"></div>
        <div
          id="garage-dialog"
          class="garage-modal__dialog card"
          role="dialog"
          aria-modal="true"
          aria-live="polite"
          aria-labelledby="garage-title"
          tabindex="-1"
        >
          <div class="garage-panel__header">
            <h2 id="garage-title" data-i18n="title.garage">Garage</h2>
            <button
              id="close-garage-btn"
              class="secondary garage-panel__close"
              type="button"
              data-i18n="button.closeGarage"
            >
              Close garage
            </button>
          </div>
          <p class="garage-panel__hint" data-i18n="hint.garageUnlock">Choose from your unlocked vehicles</p>
          <div id="garage-grid" class="garage-grid" role="listbox" aria-label="Vehicle style"></div>
          <label for="vehicle-color" data-i18n="label.vehicleColor">Vehicle colour</label>
          <input id="vehicle-color" type="color" value="#2c7be5" aria-label="Vehicle colour" />
        </div>
      </section>

      <section id="update-banner" class="card update-banner hidden" aria-live="polite">
        <p class="update-banner__text" data-i18n="pwa.updateReady">A new version is ready.</p>
        <div class="update-banner__actions">
          <button id="update-btn" class="primary" type="button" data-i18n="button.updateNow">Update now</button>
          <button id="dismiss-update-btn" class="secondary" type="button" data-i18n="button.later">Later</button>
        </div>
      </section>

      <section id="login-screen" class="card">
        <h2 data-i18n="title.login">Welcome</h2>
        <label for="login-name" data-i18n="label.loginName">Enter your name to continue</label>
        <input id="login-name" maxlength="20" autocomplete="name" />
        <button id="login-btn" class="primary" type="button" data-i18n="button.login">Log in</button>
      </section>

      <section id="session-screen" class="card hidden">
        <p><span data-i18n="label.loggedInAs">Logged in as:</span> <strong id="active-player-name"></strong></p>
        <button id="logout-btn" class="secondary" type="button" data-i18n="button.logout">Log out</button>
      </section>

      <section id="setup-screen" class="card hidden">
        <h2 data-i18n="title.challenge">Choose your challenge</h2>
        <label for="max-table" data-i18n="label.maxTable">Highest times table (2-12)</label>
        <select id="max-table" aria-label="Highest times table"></select>

        <fieldset class="option-group">
          <legend data-i18n="legend.operation">Operation</legend>
          <label class="option-pill"><input type="radio" name="operation" value="multiply" checked /> <span data-i18n="operation.multiply">Multiplication (×)</span></label>
          <label class="option-pill"><input type="radio" name="operation" value="addition" /> <span data-i18n="operation.addition">Addition (+)</span></label>
          <label class="option-pill"><input type="radio" name="operation" value="subtraction" /> <span data-i18n="operation.subtraction">Subtraction (−)</span></label>
          <label class="option-pill"><input type="radio" name="operation" value="division" /> <span data-i18n="operation.division">Division (÷)</span></label>
        </fieldset>

        <fieldset class="option-group">
          <legend data-i18n="legend.mode">Mode</legend>
          <label class="option-pill"><input type="radio" name="mode" value="single" checked /> <span data-i18n="mode.single">Single table only</span></label>
          <label class="option-pill"><input type="radio" name="mode" value="mixed" /> <span data-i18n="mode.mixed">Mixed tables (2 to selected)</span></label>
        </fieldset>

        <fieldset>
          <legend data-i18n="legend.questionMode">Question style</legend>
          <label><input type="radio" name="question-mode" value="standard" checked /> <span data-i18n="questionMode.standard">Standard (A # B = ?)</span></label>
          <label><input type="radio" name="question-mode" value="algebra" /> <span data-i18n="questionMode.algebra">Algebra mode (missing number can be anywhere)</span></label>
        </fieldset>

        <button id="start-btn" class="primary" data-i18n="button.start">Start 1-minute sprint</button>
      </section>

      <section id="countdown-screen" class="card hidden" aria-live="polite">
        <h2 data-i18n="title.ready">Get ready!</h2>
        <div id="countdown" class="countdown">3</div>
      </section>

      <section id="game-screen" class="card hidden" aria-live="polite">
        <div class="stats">
          <div><span data-i18n="label.time">Time</span>: <strong id="time-left">60</strong>s</div>
          <div><span data-i18n="label.score">Score</span>: <strong id="score">0</strong></div>
        </div>
        <div id="question" class="question">2 × 3 = ?</div>
        <div id="game-feedback" class="feedback hidden" aria-live="polite"></div>
        <input
          id="answer"
          class="answer-display"
          type="text"
          inputmode="none"
          readonly
          tabindex="-1"
          autocomplete="off"
          aria-label="Your answer"
        />
        <div id="onscreen-keypad" class="onscreen-keypad" aria-label="Number keypad">
          <button type="button" class="keypad-btn" data-key="1">1</button>
          <button type="button" class="keypad-btn" data-key="2">2</button>
          <button type="button" class="keypad-btn" data-key="3">3</button>
          <button type="button" class="keypad-btn" data-key="4">4</button>
          <button type="button" class="keypad-btn" data-key="5">5</button>
          <button type="button" class="keypad-btn" data-key="6">6</button>
          <button type="button" class="keypad-btn" data-key="7">7</button>
          <button type="button" class="keypad-btn" data-key="8">8</button>
          <button type="button" class="keypad-btn" data-key="9">9</button>
          <button type="button" class="keypad-btn keypad-btn--secondary" data-action="clear" data-i18n="button.clearAnswer">Clear</button>
          <button type="button" class="keypad-btn" data-key="0">0</button>
          <button type="button" class="keypad-btn keypad-btn--secondary" data-action="backspace" data-i18n="button.backspace">⌫</button>
          <button type="button" class="keypad-btn keypad-btn--submit" data-action="submit" data-i18n="button.submit">Submit</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <h2 data-i18n="title.timesUp">Time's up!</h2>
        <p><span data-i18n="label.finalScore">Your final score:</span> <strong id="final-score"></strong></p>
        <div id="celebration" class="hidden celebration" data-i18n="label.topFive">⭐ NEW TOP 5! ⭐</div>
        <div id="result-feedback" class="feedback hidden" aria-live="polite"></div>

        <button id="play-again" data-i18n="button.playAgain">Play again</button>
      </section>

      <section id="leaderboard-screen" class="card">
        <h2 data-i18n="title.leaderboard">Leaderboard</h2>
        <p id="leaderboard-title">Single 2-times table</p>
        <ol id="leaderboard-list"></ol>
      </section>
    </main>

    <script src="translations.js"></script>
    <script src="app.js"></script>
  </body>
</html>
